services:
  mai-api:
    build: .
    image: mai-api:2.0.0
    command:
      - python3
      - scripts/mai_api.py
      - --db
      - /data/mai-cli.sqlite
      - --host
      - 0.0.0.0
      - --port
      - "8765"
    ports:
      - "${MAI_API_BIND:-127.0.0.1}:${MAI_API_PORT:-8765}:8765"
    environment:
      MAI_ADMIN_TOKEN: "${MAI_ADMIN_TOKEN:?set MAI_ADMIN_TOKEN before starting mai-api}"
      MAI_CHANNEL_TOKENS: "${MAI_CHANNEL_TOKENS:-}"
    volumes:
      - mai_api_data:/data
    restart: unless-stopped

volumes:
  mai_api_data:
